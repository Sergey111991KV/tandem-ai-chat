name: tandem_desktop
description: Tandem AI Chat for Windows and Linux.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  window_manager: ^0.4.3
  uuid: ^4.5.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  tdlib: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/config/
